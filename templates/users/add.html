<!-- File: templates/users/add.html -->
{% extends 'base.html' %}

{% block title %}Add User - AI Evaluation System{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h2>
            <i class="fas fa-user-plus me-2"></i>Add New User
        </h2>
    </div>
    <div class="col-md-6 text-end">
        <a href="{{ url_for('users_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Users
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('add_user') }}" id="addUserForm">
            <!-- Basic Information -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="full_name" required placeholder="Enter full name">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" name="email" required placeholder="Enter email address">
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Password <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" name="password" required placeholder="Enter password">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role <span class="text-danger">*</span></label>
                    <select class="form-select" name="role" id="roleSelect" required>
                        <option value="">Select Role</option>
                        <option value="Admin">Admin</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Student">Student</option>
                    </select>
                </div>
            </div>

            <!-- Student Specific Fields -->
            <div id="studentFields" style="display: none;">
                <hr class="my-4">
                <h5 class="mb-3"><i class="fas fa-user-graduate me-2"></i>Student Information</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Roll Number <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="roll_no" placeholder="Enter roll number">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Class <span class="text-danger">*</span></label>
                        <select class="form-select" name="class_id">
                            <option value="">Select Class</option>
                            {% for class in classes %}
                            <option value="{{ class.id }}">{{ class.class_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <!-- Teacher Specific Fields -->
            <div id="teacherFields" style="display: none;">
                <hr class="my-4">
                <h5 class="mb-3"><i class="fas fa-chalkboard-teacher me-2"></i>Teacher Information</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Qualification</label>
                        <input type="text" class="form-control" name="qualification" placeholder="e.g., M.Sc, B.Ed">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Experience (Years)</label>
                        <input type="number" class="form-control" name="experience_years" placeholder="Enter years of experience" min="0">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Assigned Class</label>
                        <select class="form-select" name="assigned_class_id">
                            <option value="">Select Class</option>
                            {% for class in classes %}
                            <option value="{{ class.id }}">{{ class.class_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Assigned Subject</label>
                        <select class="form-select" name="assigned_subject_id">
                            <option value="">Select Subject</option>
                            {% for subject in subjects %}
                            <option value="{{ subject.id }}">{{ subject.subject_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <hr class="my-4">
            <div class="text-end">
                <a href="{{ url_for('users_list') }}" class="btn btn-secondary me-2">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Add User
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('roleSelect').addEventListener('change', function() {
        const role = this.value;
        const studentFields = document.getElementById('studentFields');
        const teacherFields = document.getElementById('teacherFields');
        
        // Hide all role-specific fields
        studentFields.style.display = 'none';
        teacherFields.style.display = 'none';
        
        // Remove required attributes
        studentFields.querySelectorAll('input, select').forEach(field => {
            field.removeAttribute('required');
        });
        teacherFields.querySelectorAll('input, select').forEach(field => {
            field.removeAttribute('required');
        });
        
        // Show and set required for selected role
        if (role === 'Student') {
            studentFields.style.display = 'block';
            document.querySelector('input[name="roll_no"]').setAttribute('required', 'required');
            document.querySelector('select[name="class_id"]').setAttribute('required', 'required');
        } else if (role === 'Teacher') {
            teacherFields.style.display = 'block';
        }
    });
</script>
{% endblock %}
