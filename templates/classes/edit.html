<!-- File: templates/classes/edit.html -->
{% extends 'base.html' %}

{% block title %}Edit Class - AI Evaluation System{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <h2>
            <i class="fas fa-edit me-2"></i>Edit Class
        </h2>
    </div>
    <div class="col-md-6 text-end">
        <a href="{{ url_for('classes_list') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left me-2"></i>Back to Classes
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_class', class_id=class_data.id) }}">
            <div class="mb-3">
                <label class="form-label">Class Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="class_name" value="{{ class_data.class_name }}" required>
                <small class="text-muted">Enter a unique class name</small>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" name="description" rows="4">{{ class_data.description }}</textarea>
            </div>

            <hr class="my-4">
            <div class="text-end">
                <a href="{{ url_for('classes_list') }}" class="btn btn-secondary me-2">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Update Class
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
