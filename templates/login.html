<!-- File: templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Evaluation System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="mb-3">
                <i class="fa-solid fa-brain fa-3x text-primary"></i>
              </div>
              <h3 class="fw-bold mb-0">Smart Exam Automation & Plagiarism Detection System</h3>
              <small class="text-muted">Sign in to continue</small>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0"><i class="fa-solid fa-envelope text-secondary"></i></span>
                  <input type="email" class="form-control border-0 border-bottom" name="email" placeholder="Enter your email" required>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0"><i class="fa-solid fa-lock text-secondary"></i></span>
                  <input type="password" class="form-control border-0 border-bottom" name="password" placeholder="Enter your password" required>
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg fw-semibold shadow-sm">
                  <i class="fa-solid fa-right-to-bracket me-2"></i> Login
                </button>
              </div>
            </form>

            <div class="text-center mt-4">
              <small class="text-muted d-block">
                <i class="fa-solid fa-circle-info me-1"></i>
                Default Admin: admin@aievaluation.com / admin123
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
